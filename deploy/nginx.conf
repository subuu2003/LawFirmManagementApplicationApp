server {
    listen 80;
    server_name antlegal.anthemgt.com 157.245.101.58;

    # Backend: Proxy /api/ and /admin/ to Gunicorn
    location ~ ^/(api|admin) {
        include proxy_params;
        proxy_pass http://unix:/home/sammy/LawFirmManagementApplicationApp/backend/gunicorn.sock;
    }

    # Backend: Serve Static and Media Files
    location /static/ {
        alias /home/sammy/LawFirmManagementApplicationApp/backend/staticfiles/;
    }

    location /media/ {
        alias /home/sammy/LawFirmManagementApplicationApp/backend/media/;
    }

    # Frontend: Proxy everything else to Next.js (PM2)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
